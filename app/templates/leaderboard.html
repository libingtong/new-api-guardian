<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智通AI Token 使用排行榜</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260318-design-refresh-3" />
</head>
<body class="app-shell">
  <div class="page-shell">
    <header class="hero-shell">
      <div class="hero-copy">
        <span class="hero-eyebrow">Leaderboard View</span>
        <h1>智通AI Token 使用排行榜</h1>
        <p>把总 Tokens、活跃天数、模型覆盖和工作量指数放在一个更适合展示和对比的榜单视图里。</p>
      </div>
      <div class="hero-side">
        <nav class="nav-links nav-pills">
          <a href="/analytics">使用量分析</a>
          <a href="{{ admin_path }}">治理控制台</a>
        </nav>
        <div class="hero-note">
          <strong>适合大屏展示</strong>
          <span>默认按总 Tokens 排序，也保留 IP 详情钻取，适合运营和团队复盘场景。</span>
        </div>
      </div>
    </header>

    <main class="page-content">
      <section class="panel panel-hero">
        <div class="section-title">
          <div>
            <h2>榜单筛选</h2>
            <p>控制时间范围、分组和榜单条数，适合做月榜、周榜和专项复盘。</p>
          </div>
          <div class="action-cluster">
            <button id="runBtn">刷新榜单</button>
          </div>
        </div>
        <div class="filters-grid compact">
          <label>开始时间
            <input type="datetime-local" id="startTime" />
          </label>
          <label>结束时间
            <input type="datetime-local" id="endTime" />
          </label>
          <label>分组
            <select id="groupSelect"><option value="">全部</option></select>
          </label>
          <label>榜单条数
            <input type="number" id="limitInput" min="1" max="500" value="100" />
          </label>
        </div>
      </section>

      <section class="panel">
        <div class="section-title compact">
          <div>
            <h2>排行榜</h2>
            <p>按总 Tokens 排序，同时展示模型覆盖、活跃天数、主力模型和工作量指数。</p>
          </div>
          <div class="action-cluster" id="leaderboardColumnPicker"></div>
        </div>
        <div class="table-wrap">
          <table id="leaderboardTable">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div class="modal hidden" id="ipDetailModal">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-dialog">
      <div class="modal-header">
        <div>
          <h3 id="ipDetailTitle">IP 详情</h3>
          <p id="ipDetailSubtitle"></p>
        </div>
        <button type="button" class="ghost-btn" id="ipDetailCloseBtn">关闭</button>
      </div>
      <div class="cards compact" id="ipDetailSummary"></div>
      <div class="table-wrap">
        <table id="ipDetailTable">
          <thead>
            <tr>
              <th>IP</th>
              <th>请求数</th>
              <th>总 Tokens</th>
              <th>总 Quota</th>
              <th>错误数</th>
              <th>首次访问</th>
              <th>最近访问</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/static/leaderboard.js?v=20260318-design-refresh-2"></script>
</body>
</html>
